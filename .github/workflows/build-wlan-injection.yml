name: Build WLAN Module and vendor_dlkm

on:
  workflow_dispatch:
    inputs:
      pixelos_branch:
        description: PixelOS onyx kernel-module branch
        required: true
        type: string
        default: sixteen-qpr2
      wlan_branch:
        description: MiCode WLAN branch matching the installed vendor driver
        required: true
        type: string
        default: piano-w-oss
      enable_injection:
        description: Apply the injection port (disable for a source/ABI control build)
        required: true
        type: boolean
        default: true
      apply_compat_patch:
        description: Apply the neutral 6.6 compatibility patch to a control build
        required: true
        type: boolean
        default: false
      kernel_source_repo:
        description: Device kernel source used for WLAN ABI headers
        required: true
        type: string
        default: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
      kernel_source_branch:
        description: Xiaomi kernel source branch used for WLAN ABI headers
        required: true
        type: string
        default: piano-w-oss
      kernel_symvers_url:
        description: Module.symvers from the installed kernel base
        required: true
        type: string
        default: https://github.com/Loukious/konoha-kernel-gki/releases/download/wlan-kernel-symbols/Module.symvers
      kernel_symvers_sha256_url:
        description: SHA-256 file for Module.symvers
        required: true
        type: string
        default: https://github.com/Loukious/konoha-kernel-gki/releases/download/wlan-kernel-symbols/Module.symvers.sha256
      stock_vendor_dlkm_url:
        description: Matching PixelOS onyx stock vendor_dlkm template
        required: true
        type: string
        default: https://github.com/Loukious/konoha-kernel-gki/releases/download/vendor-dlkm-template-20260613/vendor_dlkm-stock.img
      stock_vendor_dlkm_sha256:
        description: SHA-256 of the stock vendor_dlkm template
        required: true
        type: string
        default: 7ab9cbc6ecd05e6321daf25706a0fdcdd6b625e39aeab0ecfa1a71cbf3757c2e

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: wlan-module-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WLAN module and package vendor_dlkm
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          path: gki-clo

      - name: Install module and image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            android-sdk-libsparse-utils bc bison build-essential ccache curl \
            clang erofs-utils fakeroot flex g++-multilib gcc-multilib git gnupg \
            gperf imagemagick jq kmod lib32ncurses-dev lib32readline-dev \
            lib32z1-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 \
            libxml2-utils lld llvm lzop pngcrush python3 rsync schedtool \
            squashfs-tools wget xsltproc zip zlib1g-dev zstd

      - name: Create module-build swap
        run: |
          sudo fallocate -l 6G /mnt/wlan_swapfile
          sudo chmod 600 /mnt/wlan_swapfile
          sudo mkswap /mnt/wlan_swapfile
          sudo swapon /mnt/wlan_swapfile

      - name: Download Neutron Clang Toolchain
        run: |
          mkdir -p toolchains/neutron-clang
          cd toolchains/neutron-clang
          bash <(curl -fsSL "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") \
            -S=10032024 --noconfirm --noprogress --noaxel
          bash <(curl -fsSL "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") \
            --patch=glibc --noconfirm --noprogress --noaxel
          bin/clang --version

      - name: Clone WLAN and PixelOS inputs
        env:
          KERNEL_SOURCE_BRANCH: ${{ inputs.kernel_source_branch }}
          KERNEL_SOURCE_REPO: ${{ inputs.kernel_source_repo }}
          PIXELOS_BRANCH: ${{ inputs.pixelos_branch }}
          WLAN_BRANCH: ${{ inputs.wlan_branch }}
        run: |
          mkdir -p gki-clo/vendor/qcom/opensource gki-clo/sources/pixelos
          git clone --depth=1 --filter=blob:none --single-branch \
            --branch "$KERNEL_SOURCE_BRANCH" "$KERNEL_SOURCE_REPO" \
            gki-clo/sources/xiaomi-kernel
          git clone --depth=1 --branch "$WLAN_BRANCH" \
            https://github.com/MiCode/vendor_qcom_opensource_wlan.git \
            gki-clo/vendor/qcom/opensource/wlan
          git clone --depth=1 --branch "$PIXELOS_BRANCH" \
            https://github.com/PixelOS-Devices/android_device_xiaomi_onyx-kernel.git \
            gki-clo/sources/pixelos/android_device_xiaomi_onyx-kernel
          git clone --depth=1 https://android.googlesource.com/platform/external/avb \
            gki-clo/sources/avb

          wlan_version="$(sed -n 's/.*QWLAN_VERSIONSTR[[:space:]]*"\([^"]*\)".*/\1/p' \
            gki-clo/vendor/qcom/opensource/wlan/qcacld-3.0/core/mac/inc/qwlan_version.h)"
          kernel_device="${KERNEL_SOURCE_BRANCH%%-*}"
          echo "WLAN source branch: $WLAN_BRANCH"
          echo "WLAN source version: $wlan_version"
          echo "Kernel source device config: $kernel_device"
          test -n "$wlan_version"
          test -f "gki-clo/sources/xiaomi-kernel/build.config.msm.$kernel_device"
          test -f gki-clo/sources/xiaomi-kernel/include/linux/qcom-iommu-util.h
          test -f gki-clo/sources/xiaomi-kernel/kernel/sched/walt/walt.c

      - name: Download kernel symbols and stock image
        env:
          SYMVERS_URL: ${{ inputs.kernel_symvers_url }}
          SYMVERS_SHA256_URL: ${{ inputs.kernel_symvers_sha256_url }}
          STOCK_URL: ${{ inputs.stock_vendor_dlkm_url }}
          STOCK_SHA256: ${{ inputs.stock_vendor_dlkm_sha256 }}
        run: |
          mkdir -p gki-clo/out
          curl -fL --retry 3 "$SYMVERS_URL" -o gki-clo/out/Module.symvers
          curl -fL --retry 3 "$SYMVERS_SHA256_URL" -o gki-clo/out/Module.symvers.sha256
          (cd gki-clo/out && sha256sum -c Module.symvers.sha256)

          curl -fL --retry 3 "$STOCK_URL" \
            -o gki-clo/sources/pixelos/vendor_dlkm-stock.img
          echo "$STOCK_SHA256  gki-clo/sources/pixelos/vendor_dlkm-stock.img" | sha256sum -c -

      - name: Apply WCN7750 packet-injection port
        if: ${{ inputs.enable_injection }}
        working-directory: gki-clo/vendor/qcom/opensource/wlan
        run: |
          git apply --check "$GITHUB_WORKSPACE/gki-clo/docs/nethunter/wcn7750-6.6-packet-injection.patch"
          git apply "$GITHUB_WORKSPACE/gki-clo/docs/nethunter/wcn7750-6.6-packet-injection.patch"
          git diff --check

      - name: Apply WCN7750 6.6 build compatibility
        if: ${{ inputs.enable_injection == false && inputs.apply_compat_patch }}
        working-directory: gki-clo/vendor/qcom/opensource/wlan
        run: |
          primary="$GITHUB_WORKSPACE/gki-clo/docs/nethunter/wcn7750-6.6-build-compat.patch"
          fallback="$GITHUB_WORKSPACE/gki-clo/docs/nethunter/wcn7750-119O-build-compat.patch"
          patch="$primary"
          if ! git apply --check "$patch" 2>/tmp/wcn7750-compat.err; then
            patch="$fallback"
            git apply --check "$patch"
          fi
          echo "Applying compatibility patch: $(basename "$patch")"
          git apply "$patch"
          git diff --check

      - name: Prepare Xiaomi Onyx kernel ABI headers
        working-directory: gki-clo
        env:
          KERNEL_SOURCE_BRANCH: ${{ inputs.kernel_source_branch }}
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchains/neutron-clang/bin:$PATH"
          clang --version

          abi_src="$GITHUB_WORKSPACE/gki-clo/sources/xiaomi-kernel"
          abi_out="$GITHUB_WORKSPACE/gki-clo/out"
          saved_symvers="$RUNNER_TEMP/wlan-Module.symvers"
          kernel_device="${KERNEL_SOURCE_BRANCH%%-*}"
          vendor_perf_config="$abi_src/arch/arm64/configs/vendor/${kernel_device}_perf.config"

          cp "$abi_out/Module.symvers" "$saved_symvers"
          mkdir -p "$abi_out"
          install -D -m 0644 \
            tools/xiaomi-source-stubs/drivers/misc/hwid/Kconfig \
            "$abi_src/drivers/misc/hwid/Kconfig"
          rm -rf "$abi_src/drivers/power/supply/mca"
          install -D -m 0644 \
            tools/xiaomi-source-stubs/drivers/power/supply/mca/Kconfig \
            "$abi_src/drivers/power/supply/mca/Kconfig"
          if [[ ! -f "$vendor_perf_config" ]]; then
            echo "Missing vendor perf config: $vendor_perf_config" >&2
            find "$abi_src/arch/arm64/configs/vendor" -maxdepth 1 -name '*_perf.config' -printf '%f\n' | sort >&2
            exit 1
          fi
          KCONFIG_CONFIG="$abi_out/.config" \
            "$abi_src/scripts/kconfig/merge_config.sh" -m -r -y \
            "$abi_src/arch/arm64/configs/gki_defconfig" \
            "$abi_src/arch/arm64/configs/vendor/sun_perf.config" \
            "$vendor_perf_config"
          "$abi_src/scripts/config" --file "$abi_out/.config" \
            --set-str LOCALVERSION "-android15-8-4k" \
            --disable LOCALVERSION_AUTO \
            --disable KUNIT
          make -j"$(nproc)" -C "$abi_src" O="$abi_out" \
            ARCH=arm64 LLVM=1 LLVM_IAS=1 LOCALVERSION= \
            olddefconfig prepare modules_prepare
          cp "$saved_symvers" "$abi_out/Module.symvers"

          grep -qx '# CONFIG_KUNIT is not set' "$abi_out/.config"
          kernel_release="$(cat "$abi_out/include/config/kernel.release")"
          case "$kernel_release" in
            6.6.*-android15-8-4k) ;;
            *) echo "Unexpected Onyx kernel release: $kernel_release" >&2; exit 1 ;;
          esac
          echo "WLAN_KERNEL_SRC=$abi_src" >> "$GITHUB_ENV"
          echo "WLAN_KERNEL_OUT=$abi_out" >> "$GITHUB_ENV"
          echo "Xiaomi source branch: $KERNEL_SOURCE_BRANCH"
          echo "Xiaomi source commit: $(git -C "$abi_src" rev-parse HEAD)"
          echo "Xiaomi vendor perf config: $(basename "$vendor_perf_config")"
          echo "Kernel release: $kernel_release"

      - name: Build PixelOS WLAN module
        working-directory: gki-clo
        env:
          CC: clang
          KERNEL_SRC: ${{ env.WLAN_KERNEL_SRC }}
          KERNEL_OUT: ${{ env.WLAN_KERNEL_OUT }}
          ENABLE_INJECTION: ${{ inputs.enable_injection }}
          APPLY_COMPAT_PATCH: ${{ inputs.apply_compat_patch }}
          KERNEL_SOURCE_BRANCH: ${{ inputs.kernel_source_branch }}
          WLAN_BRANCH: ${{ inputs.wlan_branch }}
          WLAN_EXTRA_KCFLAGS: ""
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchains/neutron-clang/bin:$PATH"
          clang --version

          chmod +x tools/*.sh
          tools/make_pixelos_wlan_symvers.sh

          if [[ "$ENABLE_INJECTION" == "true" ]]; then
            mode=injection
          elif [[ "$APPLY_COMPAT_PATCH" == "true" ]]; then
            mode=control-compat
          else
            mode=control-clean
          fi
          mode="${mode}-${WLAN_BRANCH}-${KERNEL_SOURCE_BRANCH}"
          module="artifacts/wlan/qca_cld3_wcn7750-konoha-${mode}.ko"
          REQUIRE_INJECTION="$ENABLE_INJECTION" \
            tools/build_wlan_injection_module.sh "$module"

          echo "WLAN_MODE=$mode" >> "$GITHUB_ENV"
          echo "WLAN_MODULE=$module" >> "$GITHUB_ENV"
          kernel_release="$(cat "$KERNEL_OUT/include/config/kernel.release")"
          module_vermagic="$(modinfo -F vermagic "$module")"

          case "$module_vermagic" in
            "$kernel_release"*) ;;
            *) echo "WLAN module vermagic does not match the prepared kernel" >&2; exit 1 ;;
          esac
          if [[ "$ENABLE_INJECTION" == "true" ]]; then
            grep -a -q hdd_monitor_mode_tx_inject "$module"
          elif grep -a -q hdd_monitor_mode_tx_inject "$module"; then
            echo "Control module unexpectedly contains injection code" >&2
            exit 1
          fi
          grep -a -q qcwlanstate "$module"

          stock_module=sources/pixelos/android_device_xiaomi_onyx-kernel/modules/vendor_dlkm/qca_cld3_wcn7750.ko
          stock_ops_size="$(readelf -sW "$stock_module" | awk '$8 == "wlan_hdd_cfg80211_ops" { print $3; exit }')"
          module_ops_size="$(readelf -sW "$module" | awk '$8 == "wlan_hdd_cfg80211_ops" { print $3; exit }')"
          test -n "$stock_ops_size"
          test "$module_ops_size" = "$stock_ops_size"

          echo "kernel release:  $kernel_release"
          echo "module vermagic: $module_vermagic"
          echo "cfg80211_ops:    $module_ops_size bytes (PixelOS stock: $stock_ops_size)"

      - name: Build PixelOS vendor_dlkm images
        working-directory: gki-clo
        run: |
          tools/make_pixelos_vendor_dlkm_img.sh \
            --stock-image sources/pixelos/vendor_dlkm-stock.img \
            --wifi-ko "$WLAN_MODULE" \
            --cluster-size 4096 \
            --allow-vermagic-mismatch \
            --avbtool sources/avb/avbtool.py \
            --out "artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-${WLAN_MODE}-erofs.img" \
            --sparse-out "artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-${WLAN_MODE}-erofs-sparse.img"

      - name: Verify artifacts
        working-directory: gki-clo
        run: |
          module="$WLAN_MODULE"
          stock=sources/pixelos/vendor_dlkm-stock.img
          raw="artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-${WLAN_MODE}-erofs.img"
          sparse="artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-${WLAN_MODE}-erofs-sparse.img"
          roundtrip="$RUNNER_TEMP/vendor_dlkm-roundtrip.img"
          extracted_root="$RUNNER_TEMP/vendor_dlkm-extracted"
          verify_dir="$RUNNER_TEMP/avb-verify"

          test "$(stat -c %s "$raw")" = "$(stat -c %s "$stock")"
          mkdir -p "$extracted_root" "$verify_dir"
          fsck.erofs --extract="$extracted_root" --no-preserve "$raw"
          cmp "$module" "$extracted_root/lib/modules/qca_cld3_wcn7750.ko"
          simg2img "$sparse" "$roundtrip"
          cmp "$raw" "$roundtrip"
          ln -s "$PWD/$raw" "$verify_dir/vendor_dlkm.img"
          (cd "$verify_dir" && python3 "$GITHUB_WORKSPACE/gki-clo/sources/avb/avbtool.py" \
            verify_image --image vendor_dlkm.img)
          sha256sum "$module" "$raw" "$sparse" | tee artifacts/SHA256SUMS

      - name: Upload WLAN module and image
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-onyx-WCN7750-${{ env.WLAN_MODE }}
          path: |
            gki-clo/artifacts/SHA256SUMS
            gki-clo/artifacts/wlan/*.ko
            gki-clo/artifacts/vendor_dlkm/*.img
          retention-days: 7
          if-no-files-found: error
