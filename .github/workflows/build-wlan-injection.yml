name: Package WLAN Injection vendor_dlkm

on:
  workflow_dispatch:
    inputs:
      wlan_module_url:
        description: Prebuilt WLAN injection module URL
        required: true
        type: string
        default: https://github.com/Loukious/konoha-kernel-gki/releases/download/wlan-injection-base/qca_cld3_wcn7750-konoha-injection.ko
      wlan_module_sha256_url:
        description: SHA-256 file for the prebuilt WLAN module
        required: true
        type: string
        default: https://github.com/Loukious/konoha-kernel-gki/releases/download/wlan-injection-base/qca_cld3_wcn7750-konoha-injection.ko.sha256
      bootstrap_module_run_id:
        description: Combined-build run used only until the stable module release exists
        required: true
        type: string
        default: "27904909516"
      expected_kernel_release:
        description: Required WLAN module vermagic prefix
        required: true
        type: string
        default: 6.6.142
      stock_vendor_dlkm_url:
        description: Matching PixelOS onyx stock vendor_dlkm template
        required: true
        type: string
        default: https://github.com/Loukious/konoha-kernel-gki/releases/download/vendor-dlkm-template-20260613/vendor_dlkm-stock.img
      stock_vendor_dlkm_sha256:
        description: SHA-256 of the stock vendor_dlkm template
        required: true
        type: string
        default: 7ab9cbc6ecd05e6321daf25706a0fdcdd6b625e39aeab0ecfa1a71cbf3757c2e

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read

concurrency:
  group: wlan-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package and verify vendor_dlkm
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          path: gki-clo

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            android-sdk-libsparse-utils curl erofs-utils git kmod python3

      - name: Download image inputs
        env:
          MODULE_URL: ${{ inputs.wlan_module_url }}
          MODULE_SHA256_URL: ${{ inputs.wlan_module_sha256_url }}
          BOOTSTRAP_RUN_ID: ${{ inputs.bootstrap_module_run_id }}
          STOCK_URL: ${{ inputs.stock_vendor_dlkm_url }}
          STOCK_SHA256: ${{ inputs.stock_vendor_dlkm_sha256 }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p gki-clo/artifacts/wlan gki-clo/sources/pixelos
          git clone --depth=1 https://android.googlesource.com/platform/external/avb \
            gki-clo/sources/avb

          module=gki-clo/artifacts/wlan/qca_cld3_wcn7750-konoha-injection.ko
          checksum="$module.sha256"
          if curl -fL --retry 3 "$MODULE_URL" -o "$module"; then
            curl -fL --retry 3 "$MODULE_SHA256_URL" -o "$checksum"
          else
            echo "Stable module is unavailable; using bootstrap run $BOOTSTRAP_RUN_ID"
            rm -f "$module"
            mkdir -p "$RUNNER_TEMP/wlan-base"
            gh run download "$BOOTSTRAP_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name PixelOS-onyx-WCN7750-injection \
              --dir "$RUNNER_TEMP/wlan-base"
            found_module="$(find "$RUNNER_TEMP/wlan-base" -type f \
              -name qca_cld3_wcn7750-konoha-injection.ko -print -quit)"
            test -n "$found_module"
            cp "$found_module" "$module"
            (cd gki-clo/artifacts/wlan && \
              sha256sum qca_cld3_wcn7750-konoha-injection.ko \
                >qca_cld3_wcn7750-konoha-injection.ko.sha256)
          fi
          (
            cd gki-clo/artifacts/wlan
            sha256sum -c qca_cld3_wcn7750-konoha-injection.ko.sha256
          )

          curl -fL --retry 3 "$STOCK_URL" \
            -o gki-clo/sources/pixelos/vendor_dlkm-stock.img
          echo "$STOCK_SHA256  gki-clo/sources/pixelos/vendor_dlkm-stock.img" | sha256sum -c -

      - name: Validate WLAN module
        working-directory: gki-clo
        env:
          EXPECTED_RELEASE: ${{ inputs.expected_kernel_release }}
        run: |
          module=artifacts/wlan/qca_cld3_wcn7750-konoha-injection.ko
          module_vermagic="$(modinfo -F vermagic "$module")"

          test "$(modinfo -F name "$module")" = qca_cld3_wcn7750
          case "$module_vermagic" in
            "$EXPECTED_RELEASE"*) ;;
            *) echo "Unexpected WLAN module vermagic: $module_vermagic" >&2; exit 1 ;;
          esac
          grep -a -q hdd_monitor_mode_tx_inject "$module"
          grep -a -q qcwlanstate "$module"
          echo "module vermagic: $module_vermagic"

      - name: Build PixelOS vendor_dlkm images
        working-directory: gki-clo
        run: |
          chmod +x tools/make_pixelos_vendor_dlkm_img.sh
          tools/make_pixelos_vendor_dlkm_img.sh \
            --stock-image sources/pixelos/vendor_dlkm-stock.img \
            --wifi-ko artifacts/wlan/qca_cld3_wcn7750-konoha-injection.ko \
            --allow-vermagic-mismatch \
            --avbtool sources/avb/avbtool.py \
            --out artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-injection-erofs.img \
            --sparse-out artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-injection-erofs-sparse.img

      - name: Verify images
        working-directory: gki-clo
        run: |
          module=artifacts/wlan/qca_cld3_wcn7750-konoha-injection.ko
          stock=sources/pixelos/vendor_dlkm-stock.img
          raw=artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-injection-erofs.img
          sparse=artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-injection-erofs-sparse.img
          roundtrip="$RUNNER_TEMP/vendor_dlkm-roundtrip.img"
          extracted_root="$RUNNER_TEMP/vendor_dlkm-extracted"
          verify_dir="$RUNNER_TEMP/avb-verify"

          test "$(stat -c %s "$raw")" = "$(stat -c %s "$stock")"
          mkdir -p "$extracted_root" "$verify_dir"
          fsck.erofs --extract="$extracted_root" --no-preserve "$raw"
          cmp "$module" "$extracted_root/lib/modules/qca_cld3_wcn7750.ko"
          simg2img "$sparse" "$roundtrip"
          cmp "$raw" "$roundtrip"
          ln -s "$PWD/$raw" "$verify_dir/vendor_dlkm.img"
          (cd "$verify_dir" && python3 "$GITHUB_WORKSPACE/gki-clo/sources/avb/avbtool.py" \
            verify_image --image vendor_dlkm.img)
          sha256sum "$module" "$raw" "$sparse" | tee artifacts/SHA256SUMS

      - name: Upload WLAN injection image
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-onyx-WCN7750-injection-image
          path: |
            gki-clo/artifacts/SHA256SUMS
            gki-clo/artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-injection-erofs.img
            gki-clo/artifacts/vendor_dlkm/vendor_dlkm-pixelos-onyx-qca-injection-erofs-sparse.img
          retention-days: 7
          if-no-files-found: error
