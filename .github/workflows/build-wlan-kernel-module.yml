name: Build WLAN Kernel Base

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: wlan-kernel-base-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build kernel and publish module symbols
    runs-on: ubuntu-24.04
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4
        with:
          path: gki-clo

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache clang curl fakeroot flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick jq kmod \
            lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lld llvm lzop \
            pngcrush python3 rsync schedtool squashfs-tools wget xsltproc \
            zip zlib1g-dev zstd

      - name: Create build swap
        run: |
          sudo fallocate -l 10G /mnt/build_swapfile
          sudo chmod 600 /mnt/build_swapfile
          sudo mkswap /mnt/build_swapfile
          sudo swapon /mnt/build_swapfile

      - name: Build matching KSU-Next kernel
        working-directory: gki-clo
        run: |
          chmod +x build.sh
          ./build.sh \
            hz=250 \
            variant=root \
            root=ksu-next \
            kpm=off \
            hardened=off \
            bypasscharging=on \
            droidspaces=off \
            htsr=on \
            wifi_exploit=on \
            kgsl_exploit=on \
            data_exploit=on \
            debug=on \
            nethunter=on \
            nethunter_extra=off \
            kernel_name=-Kono-Ha-Kernel \
            spoof_uname=on \
            lto=full

      - name: Package kernel symbol base
        working-directory: gki-clo
        run: |
          test -s out/Module.symvers
          mkdir -p artifacts/kernel-base
          cp out/Module.symvers artifacts/kernel-base/Module.symvers
          (
            cd artifacts/kernel-base
            sha256sum Module.symvers >Module.symvers.sha256
          )
          {
            echo "kernel_release=$(cat out/include/config/kernel.release)"
            echo "source_sha=$GITHUB_SHA"
          } >artifacts/kernel-base/WLAN_KERNEL_BASE_INFO.txt

      - name: Upload matching kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kono-Ha-KSU-Next-NetHunter-matching-kernel
          path: gki-clo/Kono-Ha-Release/
          retention-days: 7
          if-no-files-found: error

      - name: Upload kernel symbol base
        uses: actions/upload-artifact@v4
        with:
          name: Kono-Ha-WLAN-kernel-symbols
          path: gki-clo/artifacts/kernel-base/
          retention-days: 30
          if-no-files-found: error

      - name: Publish stable kernel symbol base
        working-directory: gki-clo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=wlan-kernel-symbols
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "WLAN kernel symbol base" \
              --notes "Module.symvers used by the fast WLAN module and vendor_dlkm workflow."
          fi
          gh release upload "$tag" \
            artifacts/kernel-base/Module.symvers \
            artifacts/kernel-base/Module.symvers.sha256 \
            artifacts/kernel-base/WLAN_KERNEL_BASE_INFO.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
